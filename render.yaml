services:
  - type: web
    name: mantra-learn-api
    runtime: docker
    dockerfilePath: ./infra/docker/Dockerfile.api
    dockerContext: .
    plan: standard
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: mantra-learn-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://learn.mantraai.cloud,https://mantraai.cloud,https://learn.mantra.ai,https://training-accelerator-program-api.vercel.app,https://training-accelarator-program-api.vercel.app
      - key: USE_DOCKER_SANDBOX
        value: 'false'
      - key: AI_PROVIDER
        value: qwen
      - key: QWEN_BASE_URL
        value: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      - key: QWEN_MODEL
        value: qwen-turbo
      - key: QWEN_API_KEY
        sync: false

databases:
  - name: mantra-learn-db
    plan: free
    databaseName: constel_nextgen
    user: constel
